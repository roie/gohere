name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test ./...

  release:
    name: Publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Build package binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          mkdir -p vendor/linux-x64 vendor/win32-x64
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${version}" -o vendor/linux-x64/gohere ./cmd/gohere
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.version=${version}" -o vendor/win32-x64/gohere.exe ./cmd/gohere

      - name: Generate npm package files
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          mkdir -p bin
          cat > package.json <<EOF
          {
            "name": "gohere",
            "version": "${version}",
            "description": "Tiny local dev URL launcher for .localhost projects.",
            "bin": {
              "gohere": "bin/gohere.js"
            },
            "files": [
              "bin/",
              "vendor/"
            ],
            "license": "Apache-2.0",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/roie/gohere.git"
            },
            "bugs": {
              "url": "https://github.com/roie/gohere/issues"
            },
            "homepage": "https://github.com/roie/gohere#readme",
            "keywords": [
              "localhost",
              "dev-server",
              "cli"
            ],
            "os": [
              "linux",
              "win32"
            ],
            "cpu": [
              "x64"
            ]
          }
          EOF
          cat > bin/gohere.js <<'EOF'
          #!/usr/bin/env node

          const { spawnSync } = require("node:child_process");
          const path = require("node:path");

          const platform = process.platform;
          const arch = process.arch;
          const exe = platform === "win32" ? "gohere.exe" : "gohere";
          const binary = path.join(__dirname, "..", "vendor", `${platform}-${arch}`, exe);

          const result = spawnSync(binary, process.argv.slice(2), { stdio: "inherit" });

          if (result.error) {
            console.error(`gohere binary not available for ${platform}-${arch}`);
            console.error(result.error.message);
            process.exit(1);
          }

          if (result.signal) {
            process.kill(process.pid, result.signal);
          }

          process.exit(result.status ?? 1);
          EOF
          chmod +x bin/gohere.js

      - name: Pack and smoke test npm package
        id: pack
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          tarball="$(npm pack)"
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          install_dir="$(mktemp -d)"
          npm install --prefix "$install_dir" "$tarball"
          test "$("$install_dir/node_modules/.bin/gohere" --version)" = "gohere ${version}"

      - name: Publish npm package
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
